<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>武林传说 · WuxiaDungeon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 背景粒子（主菜单用） -->
<canvas id="bg-canvas"></canvas>

<!-- 音频控制 -->
<button id="audio-control">♪ 音乐</button>

<!-- BGM -->
<audio id="bgm" src="https://pub-cdb8eae73d584ab0b7d006c460518c76.r2.dev/music/mainmusic2.mp3" loop></audio>

<!-- =====================================================
     屏幕1：主菜单
===================================================== -->
<div id="screen-main" class="screen active">
  <div class="game-title">武 林 传 说</div>
  <div class="game-subtitle">江湖 · 恩怨 · 传承</div>
  <nav class="main-menu">
    <button id="btn-newgame" class="btn">开 始 新 游</button>
    <button id="btn-continue" class="btn">继 续 冒 险</button>
  </nav>
  <div style="position:absolute;bottom:20px;font-size:11px;color:var(--text-dim);letter-spacing:2px;">宝可梦 × 暗黑地牢 × 武侠世界</div>
</div>

<!-- =====================================================
     屏幕S：存档选择
===================================================== -->
<div id="screen-saveselect" class="screen">
  <div class="panel" style="width:560px;max-width:95vw;">
    <div class="title-deco"><h2>选择存档</h2></div>
    <p style="font-size:13px;color:var(--text-dim);letter-spacing:1px;margin-bottom:20px;">点击空槽位可新建存档，点击已有存档可继续冒险。</p>
    <div id="saveselect-slots" class="saveselect-grid"></div>
    <div style="text-align:center;margin-top:20px;">
      <button class="btn btn-sm btn-danger" onclick="closeSaveSelect()">返 回</button>
    </div>
  </div>
</div>

<!-- =====================================================
     屏幕2：角色创建
===================================================== -->
<div id="screen-create" class="screen">
  <div class="create-container">
    <!-- 左：立绘选择 -->
    <div class="panel">
      <div class="title-deco"><h2>选择立绘</h2></div>
      <div id="char-select-grid" class="char-select-grid"></div>
    </div>

    <!-- 右：名字+确认 -->
    <div class="panel" style="display:flex;flex-direction:column;gap:20px;">
      <div class="title-deco"><h2>命 名 立 志</h2></div>

      <div>
        <label class="form-label">江湖名号</label>
        <input id="char-name-input" class="name-input" type="text" maxlength="10" placeholder="输入角色名字…">
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:auto;">
        <button id="btn-confirm-create" class="btn">踏 入 江 湖</button>
        <button id="btn-back-create" class="btn btn-danger btn-sm">返 回</button>
      </div>
    </div>
  </div>
</div>

<!-- =====================================================
     屏幕T：电影序列（开场剧情）
===================================================== -->
<div id="screen-story" class="screen">
  <!-- 全屏背景 -->
  <div id="story-bg" class="story-bg"></div>
  <!-- 叙事文字层 -->
  <div id="story-overlay" class="story-overlay">
    <!-- 中央对话框 -->
    <div id="story-dialogue-box" class="story-dialogue-box">
      <!-- 旁白模式 -->
      <div id="story-narration-mode" class="story-narration-mode hidden">
        <div class="story-narration-label">旁白</div>
        <div id="story-narration-text" class="story-narration-text"></div>
      </div>
      <!-- 人物对话模式 -->
      <div id="story-dialogue-mode" class="story-dialogue-mode hidden">
        <div class="story-dialogue-left">
          <div class="story-speaker-name" id="story-speaker-name">—</div>
          <div id="story-dialogue-text" class="story-dialogue-text"></div>
          <div id="story-choices-area" class="story-choices-area"></div>
        </div>
        <div class="story-dialogue-right">
          <img id="story-char-portrait" class="story-char-portrait" src="" alt="">
        </div>
      </div>
    </div>
    <!-- 继续提示 -->
    <div id="story-continue-hint" class="story-continue-hint hidden">
      <span>点击继续 ▾</span>
    </div>
    <!-- 跳过按钮 -->
    <button id="btn-skip-story" class="btn btn-sm story-skip-btn" onclick="skipStoryIntro()">跳过序幕</button>
  </div>
</div>

<!-- =====================================================
     屏幕3：营地
===================================================== -->
<div id="screen-camp" class="screen">
  <div class="camp-layout">
    <!-- 顶部状态栏 -->
    <div class="camp-topbar">
      <span class="char-name" id="topbar-name">—</span>
      <div class="stat-bar">
        <label>气血</label>
        <div class="bar-track"><div class="bar-fill-hp" id="bar-hp" style="width:100%"></div></div>
        <span class="bar-val" id="hp-val">200/200</span>
      </div>
      <div class="stat-bar">
        <label>内力</label>
        <div class="bar-track"><div class="bar-fill-mp" id="bar-mp" style="width:100%"></div></div>
        <span class="bar-val" id="mp-val">100/100</span>
      </div>
      <span class="gold" id="gold-val">💰 50 两</span>
      <button id="btn-camp-adventure" class="camp-adventure-btn" onclick="showScreen('depart');document.getElementById('depart-content').innerHTML='';renderDepartPanel()" title="踏入江湖，历练武学">🗡️ 踏 入 江 湖</button>
      <button id="btn-camp-save" class="btn btn-sm" onclick="doSaveGame()" title="保存当前进度">💾 存 档</button>
      <button id="btn-camp-rest" class="btn btn-sm" onclick="doRest()" title="休息恢复气血与内力">🌙 休 息</button>
      <button id="btn-camp-back" class="btn btn-sm" style="margin-left:8px;">返 回 主 界</button>
    </div>

    <!-- 左侧导航 -->
    <nav class="camp-nav">
      <button class="camp-nav-btn" data-tab="story"><span class="nav-icon">💬</span>江湖往事</button>
      <button class="camp-nav-btn" data-tab="attr"><span class="nav-icon">📊</span>角色属性</button>
      <button class="camp-nav-btn" data-tab="bag"><span class="nav-icon">📦</span>随身包裹</button>
      <button class="camp-nav-btn" data-tab="skill"><span class="nav-icon">⚔️</span>技能配置</button>
    </nav>

    <!-- 中央内容区 -->
    <div class="camp-content" id="camp-content"></div>

    <!-- 右侧剧情NPC立绘 -->
    <aside class="camp-sidebar" id="camp-sidebar">
      <div id="sidebar-story-npc" class="sidebar-story-npc">
        <img id="sidebar-npc-img" class="sidebar-npc-img" src="picture/female-main/柳清寒.png" alt="NPC">
        <div class="sidebar-npc-name" id="sidebar-npc-name">墨绐青</div>
        <div class="sidebar-npc-sub" id="sidebar-npc-sub">隐居村妇 / 前朝国师</div>
      </div>
    </aside>
  </div>
</div>

<!-- =====================================================
     屏幕4：NPC对话（营地内互动，原screen-dialog）
===================================================== -->
<div id="screen-dialog" class="screen">
  <div class="dialog-fullscreen">
    <!-- 背景（NPC立绘大图） -->
    <img id="dialog-bg-portrait" class="dialog-bg-portrait" src="" alt="">
    <div class="dialog-bg-overlay"></div>
    <!-- 对话内容 -->
    <div class="dialog-content-area">
      <div class="dialog-narrator-label hidden" id="dialog-narrator-label">旁白</div>
      <div class="dialog-speaker-name" id="dialog-speaker-name">—</div>
      <div class="dialog-text-block" id="dialog-text-block"></div>
      <div class="dialog-choices" id="dialog-choices"></div>
    </div>
    <button id="btn-close-dialog" class="btn btn-sm dialog-close-btn hidden" onclick="closeDialog()">关 闭</button>
  </div>
</div>

<!-- =====================================================
     屏幕5：选关（踏入江湖）
===================================================== -->
<div id="screen-depart" class="screen">
  <div class="depart-layout">
    <div class="depart-inner">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="title-deco" style="flex:1;margin-bottom:0;"><h2>踏 入 江 湖</h2></div>
        <button class="btn btn-sm btn-danger" onclick="enterCamp()">← 返 回 营 地</button>
      </div>
      <p style="font-size:13px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px;">行走江湖，磨砺剑法，积累经验与金两。</p>
      <p style="font-size:12px;color:#e74c3c;margin-bottom:20px;">⚠ 战斗失败将导致气血剩余1点、内力归零，请确认已备好药品与技能。</p>
      <div id="depart-content"></div>
    </div>
  </div>
</div>

<!-- =====================================================
     屏幕6：战斗
===================================================== -->
<div id="screen-battle" class="screen">
  <div class="battle-layout">
    <div class="battle-arena">
      <div class="battle-player-side">
        <div class="battle-player-img-wrap">
          <img id="battle-player-img" class="battle-player-img" src="" alt="玩家">
        </div>
        <div class="battle-char-name" id="battle-player-name">—</div>
        <div class="hp-block" style="width:220px;">
          <div class="hp-label"><span class="hl">气血</span><span class="hv" id="battle-player-hp-val">—</span></div>
          <div class="hp-track"><div class="hp-fill-p" id="battle-player-hp-bar" style="width:100%"></div></div>
          <div class="mp-track"><div class="mp-fill-p" id="battle-player-mp-bar" style="width:100%"></div></div>
          <div style="display:flex;justify-content:flex-end;margin-top:2px;">
            <span style="font-size:11px;color:#5dade2;" id="battle-player-mp-val">—</span>
          </div>
        </div>
        <div class="status-badges" id="battle-player-status"></div>
      </div>
      <div class="battle-vs">
        <div class="battle-vs-txt">VS</div>
        <div class="battle-round" id="battle-round-info">等待出手…</div>
      </div>
      <div class="battle-enemy-side">
        <div class="battle-enemy-avatar" id="battle-enemy-icon">👊</div>
        <div class="battle-enemy-name" id="battle-enemy-name">—</div>
        <div class="battle-enemy-tier" id="battle-enemy-tier">—</div>
        <div class="hp-block" style="width:220px;">
          <div class="hp-label"><span class="hl">气血</span><span class="hv" id="battle-enemy-hp-val">—</span></div>
          <div class="hp-track"><div class="hp-fill-e" id="battle-enemy-hp-bar" style="width:100%"></div></div>
        </div>
        <div class="status-badges" id="battle-enemy-status"></div>
      </div>
    </div>
    <div class="battle-log-area" id="battle-log"></div>
    <div class="battle-skill-bar-wrap">
      <div class="battle-skill-bar-label">选择出招 ▼</div>
      <div id="skill-bar"></div>
    </div>
  </div>
  <div id="battle-result-overlay" class="hidden">
    <div class="battle-result-box panel">
      <div id="battle-result-title">—</div>
      <div id="battle-result-detail">—</div>
      <button id="battle-result-btn" class="btn">返回营地</button>
    </div>
  </div>
</div>

<!-- 消息提示 -->
<div id="toast"></div>

<!-- JS -->
<script src="js/data.js"></script>
<script src="js/battle.js"></script>
<script src="js/main.js"></script>
</body>
</html>
